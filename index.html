<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriConnect – Humanoid Agriculture Marketplace</title>
    <meta name="description"
        content="AgriConnect is a localized digital marketplace connecting farmers and buyers directly, eliminating middlemen and increasing transparency in agricultural trade.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div id="initial-loader">
        <div class="loader-content">
            <img src="assets/logo.png" alt="Logo">
            <div class="loader-spinner"></div>
        </div>
    </div>
    <div id="app"></div>

    <!-- Core Application Scripts (plain scripts, order matters) -->
    <script src="js/ai-disease.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
        // Bootstrap the application after all scripts have loaded
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>

</html>
